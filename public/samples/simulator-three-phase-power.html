<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3상 전력 시뮬레이터</title>
<link rel="stylesheet" href="/samples/_tailwind.css">
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root {
    --bg-0: #0d1117;
    --bg-1: #11161d;
    --panel: #131922;
    --panel-2: #161d27;
    --border: rgba(148, 163, 184, 0.16);
    --border-soft: rgba(148, 163, 184, 0.10);
    --grid: rgba(125, 211, 252, 0.055);
    --grid-strong: rgba(125, 211, 252, 0.10);
    --teal: #5eddd6;
    --amber: #e0a458;
    --slate-txt: #c4ccd6;
    --ink: #aab4c0;
}
html, body { height: 100%; }
body {
    background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
    color: #d3dae3;
    font-family: 'Pretendard', system-ui, sans-serif;
    overflow: hidden;
}

/* 한 화면 셸 — 페이지 스크롤 금지, 컬럼 내부에서만 스크롤 */
.sim-shell {
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.sim-main {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1.65fr) minmax(0, 1fr);
    gap: 1rem;
    overflow: hidden;
}
.sim-left {
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
}
.sim-right {
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    padding-right: 4px;
}
.sim-left::-webkit-scrollbar,
.sim-right::-webkit-scrollbar { width: 7px; }
.sim-left::-webkit-scrollbar-thumb,
.sim-right::-webkit-scrollbar-thumb {
    background: rgba(148,163,184,0.22);
    border-radius: 9999px;
}
.sim-left::-webkit-scrollbar-track,
.sim-right::-webkit-scrollbar-track { background: transparent; }

@media (max-width: 1023px) {
    body { overflow: auto; }
    .sim-shell { height: auto; min-height: 100vh; overflow: visible; }
    .sim-main {
        grid-template-columns: 1fr;
        overflow: visible;
    }
    .sim-left, .sim-right { overflow: visible; }
}

.canvas-wrap {
    position: relative;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #0b0f15;
    overflow: hidden;
}
canvas#waveCanvas {
    display: block;
    width: 100%;
    height: 300px;
    background:
        linear-gradient(var(--grid-strong) 1px, transparent 1px) 0 0 / 100px 100px,
        linear-gradient(90deg, var(--grid-strong) 1px, transparent 1px) 0 0 / 100px 100px,
        linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 20px 20px,
        #0b0f15;
}
canvas#phasorCanvas {
    display: block;
    width: 100%;
    height: 420px;
    background:
        linear-gradient(var(--grid-strong) 1px, transparent 1px) 0 0 / 100px 100px,
        linear-gradient(90deg, var(--grid-strong) 1px, transparent 1px) 0 0 / 100px 100px,
        linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 20px 20px,
        #0b0f15;
}
.glass {
    background: var(--panel);
    border: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 8px 24px -16px rgba(0,0,0,0.7);
}
.pulse-dot {
    display: inline-block;
    width: 7px; height: 7px; border-radius: 9999px;
    background: var(--teal);
    box-shadow: 0 0 5px rgba(94, 221, 214, 0.55);
}

input[type=range] {
    -webkit-appearance: none;
    height: 4px;
    border-radius: 9999px;
    background: rgba(148, 163, 184, 0.22);
}
input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: #cdd5df;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
    cursor: pointer;
    border: 3px solid #2a3340;
}
input[type=range]:focus { outline: none; }
input[type=range]:focus::-webkit-slider-thumb { background: var(--teal); }

.chip { background: var(--panel-2); border: 1px solid var(--border-soft); }
.chip-v { background: var(--panel-2); border: 1px solid var(--border-soft); border-left: 2px solid rgba(94,221,214,0.55); color: var(--teal); }
.chip-r { background: var(--panel-2); border: 1px solid var(--border-soft); border-left: 2px solid rgba(224,164,88,0.7); color: var(--amber); }
.chip-pf { background: var(--panel-2); border: 1px solid var(--border-soft); border-left: 2px solid rgba(127,195,216,0.55); color: #7fc3d8; }
.chip-f { background: var(--panel-2); border: 1px solid var(--border-soft); border-left: 2px solid rgba(148,163,184,0.4); color: var(--slate-txt); }

.live-pill {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    transition: border-color 200ms;
}
.live-pill.flash { border-color: rgba(94, 221, 214, 0.40); }
.live-num {
    font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums;
    color: #d8f3f0;
}
.formula-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid rgba(94, 221, 214, 0.35);
}
.feature-row {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    transition: border-color 180ms;
}
.feature-row:hover { border-color: rgba(94, 221, 214, 0.30); }
.mode-btn {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    color: var(--ink);
    transition: border-color 160ms, color 160ms, background 160ms;
}
.mode-btn.active {
    background: rgba(94, 221, 214, 0.10);
    border-color: rgba(94, 221, 214, 0.55);
    color: #d8f3f0;
}
.preset-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--slate-txt);
    transition: border-color 160ms, color 160ms;
}
.preset-btn:hover { border-color: rgba(94, 221, 214, 0.5); color: #d8f3f0; }
.math-container { font-size: 1.0rem; color: #cdd5df; }
.neon-divider {
    height: 1px;
    background: var(--border-soft);
}
.legend-dot {
    display: inline-block; width: 9px; height: 9px; border-radius: 9999px;
    margin-right: 6px;
}
.mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
.eyebrow { color: #74808d; }
</style>
</head>
<body class="p-3 md:p-4">

<div class="sim-shell max-w-7xl mx-auto w-full relative">
    <header class="mb-3 flex-none" id="hdr">
        <div class="flex items-center gap-2 text-[11px] font-semibold tracking-widest" style="color:#7d8a97">
            <span class="pulse-dot"></span>
            THREE-PHASE POWER · WAVEFORM / PHASOR
        </div>
        <h1 class="mt-1 text-xl md:text-2xl font-bold" style="color:#e3e9f0">
            3상 전력 시뮬레이터
        </h1>
    </header>

    <!-- 라이브 4칩 -->
    <div id="livePanel" class="mb-3 grid grid-cols-2 sm:grid-cols-4 gap-2 flex-none">
        <div class="live-pill rounded-xl p-3" id="pill-vl">
            <p class="text-[10px] tracking-widest text-slate-500 font-bold">선간전압 V_L</p>
            <p class="mt-1 text-lg font-bold"><span id="vlVal" class="live-num">—</span></p>
        </div>
        <div class="live-pill rounded-xl p-3" id="pill-il">
            <p class="text-[10px] tracking-widest text-slate-500 font-bold">선전류 I_L</p>
            <p class="mt-1 text-lg font-bold"><span id="ilVal" class="live-num">—</span></p>
        </div>
        <div class="live-pill rounded-xl p-3" id="pill-p">
            <p class="text-[10px] tracking-widest text-slate-500 font-bold">총 전력 P</p>
            <p class="mt-1 text-lg font-bold"><span id="pVal" class="live-num">—</span></p>
        </div>
        <div class="live-pill rounded-xl p-3" id="pill-cos">
            <p class="text-[10px] tracking-widest text-slate-500 font-bold">역률 cos φ</p>
            <p class="mt-1 text-lg font-bold"><span id="cosVal" class="live-num">—</span></p>
        </div>
    </div>

    <div class="sim-main">
        <!-- 좌: 3상 파형 + 페이저 시각화 -->
        <div class="sim-left">
            <!-- 3상 sin파 -->
            <div class="glass rounded-xl p-3 flex-none" id="waveCard">
                <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
                    <span class="text-[11px] font-semibold eyebrow tracking-wide mono">3-PHASE — R / S / T (120° 위상차, 합성 = 0)</span>
                    <div class="flex items-center gap-3 text-[11px]">
                        <span style="color:#5eddd6"><span class="legend-dot" style="background:#5eddd6"></span>R</span>
                        <span style="color:#e0a458"><span class="legend-dot" style="background:#e0a458"></span>S</span>
                        <span style="color:#7fa8d8"><span class="legend-dot" style="background:#7fa8d8"></span>T</span>
                        <span style="color:#9aa6b3"><span class="legend-dot" style="background:#9aa6b3"></span>합</span>
                    </div>
                </div>
                <div class="canvas-wrap">
                    <canvas id="waveCanvas"></canvas>
                </div>
            </div>

            <!-- 페이저 다이어그램 + 결선도 -->
            <div class="glass rounded-xl p-3 flex-none" id="phasorCard">
                <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
                    <span class="text-[11px] font-semibold eyebrow tracking-wide mono">PHASOR — V_p · V_L · I 벡터</span>
                    <div class="flex items-center gap-2">
                        <button id="presetBalanced" class="preset-btn rounded-md px-3 py-1.5 text-xs font-bold">평형 부하</button>
                        <button id="freezeBtn" class="preset-btn rounded-md px-3 py-1.5 text-xs font-bold">정지</button>
                    </div>
                </div>
                <div class="canvas-wrap">
                    <canvas id="phasorCanvas"></canvas>
                </div>
            </div>

        </div>

        <!-- 우: 변수 조절 (이 컬럼만 내부 스크롤) -->
        <div class="sim-right" id="controlPanel">
            <div class="glass rounded-xl p-3 flex-none space-y-3">
            <h2 class="font-bold text-sm tracking-wider" style="color:#e3e9f0">변수 조절</h2>

            <!-- 결선 모드 토글 -->
            <div class="chip rounded-lg p-3">
                <label class="block text-[11px] font-bold tracking-wider mb-2" style="color:#9fb0c0">결선 방식</label>
                <div class="grid grid-cols-2 gap-2">
                    <button data-mode="Y" class="mode-btn rounded-md py-2 text-xs font-bold active">Y 결선 (스타)</button>
                    <button data-mode="D" class="mode-btn rounded-md py-2 text-xs font-bold">Δ 결선 (델타)</button>
                </div>
                <p class="text-[10px] eyebrow mt-2" id="modeHint">Y: V_L = √3 · V_p, I_L = I_p</p>
            </div>

            <div class="chip-v chip rounded-lg p-3">
                <label class="flex justify-between text-[11px] font-bold tracking-wider"><span>상전압 V_p</span><span id="vpDisp" class="font-mono text-base">220</span></label>
                <input type="range" id="vp" min="50" max="400" step="10" value="220" class="w-full mt-2 cursor-pointer">
                <p class="text-[10px] text-slate-500 mt-1 text-right">V</p>
            </div>

            <div class="chip-r chip rounded-lg p-3">
                <label class="flex justify-between text-[11px] font-bold tracking-wider"><span>부하 저항 R</span><span id="rDisp" class="font-mono text-base">10</span></label>
                <input type="range" id="r" min="1" max="100" step="1" value="10" class="w-full mt-2 cursor-pointer">
                <p class="text-[10px] text-slate-500 mt-1 text-right">Ω/상</p>
            </div>

            <div class="chip-pf chip rounded-lg p-3">
                <label class="flex justify-between text-[11px] font-bold tracking-wider"><span>역률 cos φ</span><span id="pfDisp" class="font-mono text-base">1.00</span></label>
                <input type="range" id="pf" min="0.1" max="1" step="0.01" value="1" class="w-full mt-2 cursor-pointer">
                <p class="text-[10px] text-slate-500 mt-1 text-right">(지상 부하 가정)</p>
            </div>

            <div class="chip-f chip rounded-lg p-3">
                <label class="flex justify-between text-[11px] font-bold tracking-wider"><span>주파수 f</span><span id="fDisp" class="font-mono text-base">60</span></label>
                <input type="range" id="f" min="30" max="60" step="1" value="60" class="w-full mt-2 cursor-pointer">
                <p class="text-[10px] text-slate-500 mt-1 text-right">Hz (시각화 속도)</p>
            </div>
            </div>
        </div>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
const waveCv = $('waveCanvas');
const wctx = waveCv.getContext('2d');
const phCv = $('phasorCanvas');
const pctx = phCv.getContext('2d');

let state = {
    mode: 'Y',     // 'Y' or 'D'
    Vp: 220,       // 상전압 (peak로 가정 - 시각화)
    R: 10,         // 부하 저항 (상당)
    pf: 1.0,       // 역률 cos φ
    f: 60,         // Hz (시각화 속도)
    t: 0,          // 프레임 카운트
    omega: 0,      // 누적 각도
    frozen: false
};

function resize() {
    waveCv.width = waveCv.parentElement.clientWidth - 2;
    waveCv.height = 300;
    phCv.width = phCv.parentElement.clientWidth - 2;
    phCv.height = 420;
}
window.addEventListener('resize', resize);

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

// ====================================================
// 위쪽: 3상 sin파
// ====================================================
function drawWaves() {
    const W = waveCv.width, H = waveCv.height;
    // 배경은 CSS 오실로스코프 모눈 — 캔버스는 투명 유지
    wctx.clearRect(0, 0, W, H);

    // 0 축
    wctx.strokeStyle = 'rgba(148, 163, 184, 0.28)';
    wctx.lineWidth = 1;
    wctx.beginPath();
    wctx.moveTo(0, H/2); wctx.lineTo(W, H/2);
    wctx.stroke();

    // 좌상 라벨
    wctx.save();
    wctx.font = 'bold 10px ui-monospace, monospace';
    wctx.fillStyle = 'rgba(116, 128, 141, 0.85)';
    wctx.textAlign = 'left'; wctx.textBaseline = 'top';
    wctx.fillText('3-PHASE WAVEFORMS · v(t) = Vm sin(ωt − φ)', 12, 10);
    wctx.restore();

    const cy = H / 2;
    const amp = H * 0.36;
    const cyclesShown = 2;

    const phases = [
        { name: 'R', color: '#5eddd6', light: '#5eddd6', off: 0 },
        { name: 'S', color: '#e0a458', light: '#e0a458', off: -2*Math.PI/3 },
        { name: 'T', color: '#7fa8d8', light: '#7fa8d8', off: -4*Math.PI/3 },
    ];

    // === 1) 그라데이션 fill (각 상 아래 영역) ===
    wctx.save();
    for (const p of phases) {
        const g = wctx.createLinearGradient(0, 0, 0, H);
        const colHex = p.color.replace('#', '');
        const r = parseInt(colHex.slice(0,2), 16);
        const gn = parseInt(colHex.slice(2,4), 16);
        const b = parseInt(colHex.slice(4,6), 16);
        g.addColorStop(0, `rgba(${r},${gn},${b},0.07)`);
        g.addColorStop(0.5, `rgba(${r},${gn},${b},0.02)`);
        g.addColorStop(1, `rgba(${r},${gn},${b},0.07)`);
        wctx.fillStyle = g;
        wctx.beginPath();
        wctx.moveTo(0, cy);
        for (let x = 0; x <= W; x++) {
            const phase = (x / W) * cyclesShown * Math.PI * 2;
            const v = Math.sin(state.omega + p.off - phase);
            const y = cy - v * amp;
            wctx.lineTo(x, y);
        }
        wctx.lineTo(W, cy);
        wctx.closePath();
        wctx.fill();
    }
    wctx.restore();

    // === 2) sin파 본체 (글로우 + 라인) ===
    for (const p of phases) {
        wctx.save();
        wctx.shadowBlur = 0;
        wctx.strokeStyle = p.light;
        wctx.lineWidth = 1.6;
        wctx.lineCap = 'round';
        wctx.beginPath();
        for (let x = 0; x <= W; x++) {
            const phase = (x / W) * cyclesShown * Math.PI * 2;
            const v = Math.sin(state.omega + p.off - phase);
            const y = cy - v * amp;
            if (x === 0) wctx.moveTo(x, y); else wctx.lineTo(x, y);
        }
        wctx.stroke();
        wctx.restore();

        // 현재 시점(x=0) 마커
        const vNow = Math.sin(state.omega + p.off);
        const markY = cy - vNow * amp;
        wctx.save();
        wctx.shadowBlur = 0;
        wctx.fillStyle = p.color;
        wctx.beginPath();
        wctx.arc(10, markY, 4, 0, Math.PI * 2);
        wctx.fill();
        wctx.restore();
    }

    // === 3) 합성(순시값 합) — 항상 0 시각화 ===
    wctx.save();
    wctx.shadowBlur = 0;
    wctx.strokeStyle = 'rgba(154, 166, 179, 0.7)';
    wctx.lineWidth = 1.4;
    wctx.setLineDash([6, 4]);
    wctx.beginPath();
    for (let x = 0; x <= W; x++) {
        const phase = (x / W) * cyclesShown * Math.PI * 2;
        let sum = 0;
        for (const p of phases) sum += Math.sin(state.omega + p.off - phase);
        const y = cy - sum * amp;
        if (x === 0) wctx.moveTo(x, y); else wctx.lineTo(x, y);
    }
    wctx.stroke();
    wctx.setLineDash([]);
    wctx.restore();

    // 합 = 0 라벨
    wctx.save();
    wctx.font = 'bold 10px ui-monospace, monospace';
    const lbl = `Σ v(t) ≡ 0 (3상 합성)`;
    const tw = wctx.measureText(lbl).width;
    wctx.fillStyle = 'rgba(22, 29, 39, 0.92)';
    roundRect(wctx, W - tw - 24, 8, tw + 16, 20, 6);
    wctx.fill();
    wctx.fillStyle = '#9aa6b3';
    wctx.textAlign = 'left'; wctx.textBaseline = 'middle';
    wctx.fillText(lbl, W - tw - 16, 18);
    wctx.restore();

    // 위상차 라벨 (120°)
    wctx.save();
    wctx.font = 'bold 10px ui-monospace, monospace';
    wctx.fillStyle = 'rgba(116, 128, 141, 0.8)';
    wctx.textAlign = 'left'; wctx.textBaseline = 'bottom';
    wctx.fillText('120° phase shift between phases', 12, H - 8);
    wctx.restore();
}

// ====================================================
// 아래쪽: 페이저 다이어그램 + 결선도
// ====================================================
function drawPhasor() {
    const W = phCv.width, H = phCv.height;
    // 배경은 CSS 오실로스코프 모눈 — 캔버스는 투명 유지
    pctx.clearRect(0, 0, W, H);

    // 라벨
    pctx.save();
    pctx.font = 'bold 10px ui-monospace, monospace';
    pctx.fillStyle = 'rgba(116, 128, 141, 0.85)';
    pctx.textAlign = 'left'; pctx.textBaseline = 'top';
    pctx.fillText('PHASOR DIAGRAM · V_p, V_L, I 벡터 회전', 12, 10);
    pctx.restore();

    // 좌측: 페이저 원
    const cx = W * 0.32;
    const cy = H / 2;
    const Rmax = Math.min(W * 0.27, H * 0.4);

    // 원형 격자 (3 ring)
    pctx.save();
    pctx.strokeStyle = 'rgba(148, 163, 184, 0.12)';
    pctx.lineWidth = 1;
    for (let k = 1; k <= 3; k++) {
        pctx.beginPath();
        pctx.arc(cx, cy, (Rmax * k) / 3, 0, Math.PI * 2);
        pctx.stroke();
    }
    // 십자 축
    pctx.strokeStyle = 'rgba(148, 163, 184, 0.24)';
    pctx.beginPath();
    pctx.moveTo(cx - Rmax - 10, cy); pctx.lineTo(cx + Rmax + 10, cy);
    pctx.moveTo(cx, cy - Rmax - 10); pctx.lineTo(cx, cy + Rmax + 10);
    pctx.stroke();
    pctx.restore();

    // 회전 각도
    const rot = state.omega;

    // 상전압 페이저 (V_p) — 안쪽 (3개, 120° 간격)
    const phases = [
        { name: 'R', color: '#5eddd6', light: '#5eddd6', off: 0 },
        { name: 'S', color: '#e0a458', light: '#e0a458', off: -2*Math.PI/3 },
        { name: 'T', color: '#7fa8d8', light: '#7fa8d8', off: -4*Math.PI/3 },
    ];

    // V_p의 시각 길이 (모드와 무관하게 같은 기준)
    const VpLen = Rmax * 0.55;
    // V_L 길이 = √3 · V_p (Y 결선의 시각화 핵심)
    const VLLen = VpLen * Math.sqrt(3);

    // 1) V_p 페이저 (안쪽 화살표)
    const vpPts = phases.map(p => {
        const ang = -Math.PI / 2 + p.off - rot;  // 위에서 시작, 시계 방향 회전
        return {
            ...p,
            ang,
            x: cx + Math.cos(ang) * VpLen,
            y: cy + Math.sin(ang) * VpLen,
        };
    });

    for (const v of vpPts) {
        // 화살표 본체
        pctx.save();
        pctx.shadowBlur = 0;
        pctx.strokeStyle = v.light;
        pctx.lineWidth = 1.8;
        pctx.lineCap = 'round';
        pctx.beginPath();
        pctx.moveTo(cx, cy);
        pctx.lineTo(v.x, v.y);
        pctx.stroke();

        // 화살촉
        pctx.translate(v.x, v.y);
        pctx.rotate(v.ang);
        pctx.fillStyle = v.color;
        pctx.beginPath();
        pctx.moveTo(0, 0); pctx.lineTo(-11, -6); pctx.lineTo(-11, 6); pctx.closePath();
        pctx.fill();
        pctx.restore();

        // V_p 라벨
        pctx.save();
        pctx.font = 'bold 11px ui-monospace, monospace';
        const lblTxt = `V_${v.name}`;
        const tw = pctx.measureText(lblTxt).width;
        const lx = cx + Math.cos(v.ang) * (VpLen * 0.55);
        const ly = cy + Math.sin(v.ang) * (VpLen * 0.55);
        pctx.fillStyle = 'rgba(22, 29, 39, 0.92)';
        roundRect(pctx, lx - tw/2 - 5, ly - 9, tw + 10, 18, 6);
        pctx.fill();
        pctx.fillStyle = v.light;
        pctx.textAlign = 'center'; pctx.textBaseline = 'middle';
        pctx.fillText(lblTxt, lx, ly + 1);
        pctx.restore();
    }

    // 2) V_L 페이저 (선간전압) — V_R - V_S, V_S - V_T, V_T - V_R
    // 길이 = √3 · V_p, 위상은 V_p보다 30° 앞
    const VLData = [
        { name: 'RS', color: '#e0a458', light: '#e0a458', a: 0, b: 1 },
        { name: 'ST', color: '#5eddd6', light: '#5eddd6', a: 1, b: 2 },
        { name: 'TR', color: '#7fa8d8', light: '#7fa8d8', a: 2, b: 0 },
    ];

    pctx.save();
    for (const vl of VLData) {
        const A = vpPts[vl.a];
        const B = vpPts[vl.b];
        // V_AB 페이저 = A - B, 시작은 원점에서
        const dx = (A.x - cx) - (B.x - cx);
        const dy = (A.y - cy) - (B.y - cy);
        const ex = cx + dx;
        const ey = cy + dy;
        const ang = Math.atan2(dy, dx);

        // 점선 + 글로우
        pctx.save();
        pctx.shadowBlur = 0;
        pctx.strokeStyle = vl.light;
        pctx.lineWidth = 1.6;
        pctx.setLineDash([6, 4]);
        pctx.beginPath();
        pctx.moveTo(cx, cy);
        pctx.lineTo(ex, ey);
        pctx.stroke();
        pctx.setLineDash([]);
        pctx.restore();

        // 화살촉
        pctx.save();
        pctx.translate(ex, ey);
        pctx.rotate(ang);
        pctx.shadowBlur = 0;
        pctx.fillStyle = vl.color;
        pctx.beginPath();
        pctx.moveTo(0, 0); pctx.lineTo(-10, -5); pctx.lineTo(-10, 5); pctx.closePath();
        pctx.fill();
        pctx.restore();

        // V_L 라벨
        pctx.save();
        pctx.font = 'bold 10px ui-monospace, monospace';
        const lblTxt = `V_${vl.name}`;
        const tw = pctx.measureText(lblTxt).width;
        const lx = cx + Math.cos(ang) * (VLLen * 0.78);
        const ly = cy + Math.sin(ang) * (VLLen * 0.78);
        pctx.fillStyle = 'rgba(22, 29, 39, 0.92)';
        roundRect(pctx, lx - tw/2 - 5, ly - 9, tw + 10, 18, 6);
        pctx.fill();
        pctx.fillStyle = vl.light;
        pctx.textAlign = 'center'; pctx.textBaseline = 'middle';
        pctx.fillText(lblTxt, lx, ly + 1);
        pctx.restore();

        // 삼각형 연결 (V_p 끝점 사이를 연결해 V_L 기하학적 의미 보여줌)
        pctx.save();
        pctx.strokeStyle = 'rgba(148, 163, 184, 0.22)';
        pctx.lineWidth = 1;
        pctx.setLineDash([2, 3]);
        pctx.beginPath();
        pctx.moveTo(A.x, A.y);
        pctx.lineTo(B.x, B.y);
        pctx.stroke();
        pctx.setLineDash([]);
        pctx.restore();
    }
    pctx.restore();

    // 3) 역률 각도 표시 (φ) - R상 V와 I 사이
    const phi = Math.acos(state.pf);  // rad
    // I_R 벡터: V_R에서 φ만큼 늦은 (시계방향 추가)
    const iRang = -Math.PI / 2 + 0 - rot + phi;  // V_R 각도에서 +φ만큼 (지상=뒤짐)
    const Ilen = VpLen * 0.4;
    const ix = cx + Math.cos(iRang) * Ilen;
    const iy = cy + Math.sin(iRang) * Ilen;

    pctx.save();
    pctx.shadowBlur = 0;
    pctx.strokeStyle = 'rgba(94, 221, 214, 0.95)';
    pctx.lineWidth = 1.8;
    pctx.setLineDash([3, 3]);
    pctx.beginPath();
    pctx.moveTo(cx, cy);
    pctx.lineTo(ix, iy);
    pctx.stroke();
    pctx.setLineDash([]);
    // 화살촉
    pctx.save();
    pctx.translate(ix, iy);
    pctx.rotate(iRang);
    pctx.fillStyle = '#5eddd6';
    pctx.beginPath();
    pctx.moveTo(0, 0); pctx.lineTo(-9, -5); pctx.lineTo(-9, 5); pctx.closePath();
    pctx.fill();
    pctx.restore();
    pctx.restore();

    // I_R 라벨
    pctx.save();
    pctx.font = 'bold 10px ui-monospace, monospace';
    const ilbl = 'I_R';
    const itw = pctx.measureText(ilbl).width;
    const ilx = cx + Math.cos(iRang) * (Ilen * 1.3);
    const ily = cy + Math.sin(iRang) * (Ilen * 1.3);
    pctx.fillStyle = 'rgba(22, 29, 39, 0.92)';
    roundRect(pctx, ilx - itw/2 - 5, ily - 9, itw + 10, 18, 6);
    pctx.fill();
    pctx.fillStyle = '#5eddd6';
    pctx.textAlign = 'center'; pctx.textBaseline = 'middle';
    pctx.fillText(ilbl, ilx, ily + 1);
    pctx.restore();

    // φ 각도 호
    if (phi > 0.02) {
        pctx.save();
        pctx.strokeStyle = 'rgba(224, 164, 88, 0.8)';
        pctx.lineWidth = 1.6;
        pctx.beginPath();
        const a0 = -Math.PI / 2 - rot;
        const a1 = iRang;
        pctx.arc(cx, cy, VpLen * 0.22, a0, a1, false);
        pctx.stroke();
        // φ 라벨
        const midA = (a0 + a1) / 2;
        const flx = cx + Math.cos(midA) * (VpLen * 0.32);
        const fly = cy + Math.sin(midA) * (VpLen * 0.32);
        pctx.font = 'bold 10px ui-monospace, monospace';
        pctx.fillStyle = '#e0a458';
        pctx.textAlign = 'center'; pctx.textBaseline = 'middle';
        pctx.fillText(`φ=${(phi * 180/Math.PI).toFixed(0)}°`, flx, fly);
        pctx.restore();
    }

    // 중앙 점
    pctx.save();
    pctx.fillStyle = '#aab4c0';
    pctx.shadowBlur = 0;
    pctx.beginPath();
    pctx.arc(cx, cy, 3.4, 0, Math.PI * 2);
    pctx.fill();
    pctx.restore();

    // === 우측: 결선도 (Y or Δ) ===
    drawConnection(W * 0.72, H / 2, Math.min(W * 0.22, H * 0.4));

    // === 비교 박스 (좌하단) ===
    pctx.save();
    const boxW = 200, boxH = 90;
    const bx = 14, by = H - boxH - 14;
    pctx.fillStyle = 'rgba(22, 29, 39, 0.92)';
    roundRect(pctx, bx, by, boxW, boxH, 8);
    pctx.fill();
    pctx.strokeStyle = 'rgba(148, 163, 184, 0.16)';
    pctx.lineWidth = 1;
    pctx.stroke();

    pctx.font = 'bold 10px ui-monospace, monospace';
    pctx.textAlign = 'left'; pctx.textBaseline = 'top';
    pctx.fillStyle = '#9fb0c0';
    pctx.fillText(`[${state.mode === 'Y' ? 'Y 결선' : 'Δ 결선'}]`, bx + 10, by + 8);

    pctx.font = '10px ui-monospace, monospace';
    pctx.fillStyle = '#5eddd6';
    pctx.fillText(`V_p = ${state.Vp.toFixed(0)} V`, bx + 10, by + 26);
    pctx.fillStyle = '#e0a458';
    pctx.fillText(`V_L = ${state.VL.toFixed(0)} V`, bx + 10, by + 42);
    pctx.fillStyle = '#aab4c0';
    pctx.fillText(`I_p = ${state.Ip.toFixed(2)} A`, bx + 10, by + 58);
    pctx.fillStyle = '#7fa8d8';
    pctx.fillText(`I_L = ${state.IL.toFixed(2)} A`, bx + 10, by + 74);
    pctx.restore();
}

function drawConnection(cx, cy, R) {
    // 우측에 결선도를 그림 (Y 또는 Δ)
    pctx.save();
    pctx.font = 'bold 11px ui-monospace, monospace';
    pctx.fillStyle = '#9fb0c0';
    pctx.textAlign = 'center'; pctx.textBaseline = 'top';
    pctx.fillText(state.mode === 'Y' ? 'Y 결선도' : 'Δ 결선도', cx, cy - R - 26);
    pctx.restore();

    const phaseCols = ['#5eddd6', '#e0a458', '#7fa8d8'];
    const phaseColMain = ['#5eddd6', '#e0a458', '#7fa8d8'];

    if (state.mode === 'Y') {
        // 중성점 + 3가지 부하 + 외부 단자
        // 단자 위치 (3개, 120° 간격)
        const angles = [-Math.PI/2, -Math.PI/2 + 2*Math.PI/3, -Math.PI/2 + 4*Math.PI/3];
        const termPts = angles.map(a => ({ x: cx + Math.cos(a) * R, y: cy + Math.sin(a) * R }));

        // 중성점 → 각 단자 라인 (상 권선)
        for (let i = 0; i < 3; i++) {
            const t = termPts[i];
            // 코일 (지그재그)
            pctx.save();
            pctx.shadowBlur = 0;
            pctx.strokeStyle = phaseCols[i];
            pctx.lineWidth = 1.6;
            pctx.lineCap = 'round';
            pctx.beginPath();
            // 중성점에서 단자까지 (3분의 1 지점부터 지그재그 코일)
            const segs = 12;
            for (let k = 0; k <= segs; k++) {
                const tau = k / segs;
                const px = cx + (t.x - cx) * tau;
                const py = cy + (t.y - cy) * tau;
                // 직각 방향 오프셋 (지그재그)
                const dx = t.x - cx, dy = t.y - cy;
                const len = Math.hypot(dx, dy);
                const nx = -dy / len, ny = dx / len;
                const wig = (k > 2 && k < segs - 2) ? (k % 2 === 0 ? 5 : -5) : 0;
                const fx = px + nx * wig;
                const fy = py + ny * wig;
                if (k === 0) pctx.moveTo(fx, fy); else pctx.lineTo(fx, fy);
            }
            pctx.stroke();
            pctx.restore();

            // 단자 원 (R/S/T 라벨)
            pctx.save();
            pctx.shadowBlur = 14;
            pctx.shadowBlur = 0;
            pctx.fillStyle = phaseColMain[i];
            pctx.beginPath();
            pctx.arc(t.x, t.y, 8, 0, Math.PI * 2);
            pctx.fill();
            pctx.strokeStyle = '#0b0f15';
            pctx.lineWidth = 1.5;
            pctx.stroke();
            pctx.fillStyle = '#0b0f15';
            pctx.font = 'bold 9px ui-monospace, monospace';
            pctx.textAlign = 'center'; pctx.textBaseline = 'middle';
            pctx.fillText(['R','S','T'][i], t.x, t.y + 0.5);
            pctx.restore();
        }

        // 중성점
        pctx.save();
        pctx.shadowBlur = 0;
        pctx.fillStyle = '#aab4c0';
        pctx.beginPath();
        pctx.arc(cx, cy, 5, 0, Math.PI * 2);
        pctx.fill();
        pctx.restore();

        // 중성점 라벨
        pctx.save();
        pctx.font = 'bold 9px ui-monospace, monospace';
        pctx.fillStyle = 'rgba(170,180,192,0.9)';
        pctx.textAlign = 'left';
        pctx.fillText('N (중성점)', cx + 8, cy + 4);
        pctx.restore();

        // 라벨: V_p / V_L 자연스레 강조
        pctx.save();
        pctx.font = '9px ui-monospace, monospace';
        pctx.fillStyle = '#5eddd6';
        pctx.textAlign = 'left';
        pctx.fillText('V_p: 상↔중성점', cx - R, cy + R + 16);
        pctx.fillStyle = '#e0a458';
        pctx.fillText('V_L: 상↔상 (√3·V_p)', cx - R, cy + R + 30);
        pctx.restore();
    } else {
        // Δ: 3꼭짓점 = R/S/T, 변(코일) 3개
        const angles = [-Math.PI/2, -Math.PI/2 + 2*Math.PI/3, -Math.PI/2 + 4*Math.PI/3];
        const termPts = angles.map(a => ({ x: cx + Math.cos(a) * R, y: cy + Math.sin(a) * R }));

        // 변 (각 변이 한 상의 권선)
        const edgeColMain = ['#e0a458', '#5eddd6', '#7fa8d8'];
        const edgeColLight = ['#e0a458', '#5eddd6', '#7fa8d8'];
        for (let i = 0; i < 3; i++) {
            const a = termPts[i];
            const b = termPts[(i + 1) % 3];

            pctx.save();
            pctx.shadowBlur = 0;
            pctx.strokeStyle = edgeColLight[i];
            pctx.lineWidth = 1.6;
            pctx.lineCap = 'round';
            pctx.beginPath();
            // 변 위에 지그재그 코일
            const segs = 14;
            for (let k = 0; k <= segs; k++) {
                const tau = k / segs;
                const px = a.x + (b.x - a.x) * tau;
                const py = a.y + (b.y - a.y) * tau;
                const dx = b.x - a.x, dy = b.y - a.y;
                const len = Math.hypot(dx, dy);
                const nx = -dy / len, ny = dx / len;
                const wig = (k > 2 && k < segs - 2) ? (k % 2 === 0 ? 6 : -6) : 0;
                const fx = px + nx * wig;
                const fy = py + ny * wig;
                if (k === 0) pctx.moveTo(fx, fy); else pctx.lineTo(fx, fy);
            }
            pctx.stroke();
            pctx.restore();
        }

        // 꼭짓점 (R/S/T 단자)
        for (let i = 0; i < 3; i++) {
            const t = termPts[i];
            pctx.save();
            pctx.shadowBlur = 0;
            pctx.fillStyle = phaseColMain[i];
            pctx.beginPath();
            pctx.arc(t.x, t.y, 9, 0, Math.PI * 2);
            pctx.fill();
            pctx.strokeStyle = '#0b0f15';
            pctx.lineWidth = 1.5;
            pctx.stroke();
            pctx.fillStyle = '#0b0f15';
            pctx.font = 'bold 9px ui-monospace, monospace';
            pctx.textAlign = 'center'; pctx.textBaseline = 'middle';
            pctx.fillText(['R','S','T'][i], t.x, t.y + 0.5);
            pctx.restore();
        }

        // 라벨
        pctx.save();
        pctx.font = '9px ui-monospace, monospace';
        pctx.fillStyle = '#e0a458';
        pctx.textAlign = 'left';
        pctx.fillText('V_p = V_L (변 = 선간)', cx - R, cy + R + 16);
        pctx.fillStyle = '#7fa8d8';
        pctx.fillText('I_L = √3 · I_p', cx - R, cy + R + 30);
        pctx.restore();
    }
}

// ====================================================
// 계산 + UI
// ====================================================
function compute() {
    state.Vp = +$('vp').value;
    state.R = +$('r').value;
    state.pf = +$('pf').value;
    state.f = +$('f').value;

    // 결선에 따른 V_L, I_L
    let VL, Ip, IL;
    if (state.mode === 'Y') {
        VL = Math.sqrt(3) * state.Vp;
        Ip = state.Vp / state.R;
        IL = Ip;
    } else {
        VL = state.Vp;
        Ip = state.Vp / state.R;
        IL = Math.sqrt(3) * Ip;
    }
    state.VL = VL;
    state.Ip = Ip;
    state.IL = IL;

    // 총 전력 P = √3 · V_L · I_L · cos φ
    state.P = Math.sqrt(3) * VL * IL * state.pf;

    // UI
    $('vpDisp').textContent = state.Vp;
    $('rDisp').textContent = state.R;
    $('pfDisp').textContent = state.pf.toFixed(2);
    $('fDisp').textContent = state.f;

    $('vlVal').textContent = `${VL.toFixed(0)} V`;
    $('ilVal').textContent = `${IL.toFixed(2)} A`;
    $('pVal').textContent = formatPower(state.P);
    $('cosVal').textContent = state.pf.toFixed(2);

    // 모드 힌트
    $('modeHint').textContent = state.mode === 'Y'
        ? 'Y: V_L = √3·V_p, I_L = I_p'
        : 'Δ: V_L = V_p, I_L = √3·I_p';

    // 역률 낮으면 cos pill 강조
    $('pill-cos').classList.toggle('flash', state.pf < 0.85);
    $('pill-p').classList.toggle('flash', state.P > 50000);
}

function formatPower(P) {
    if (P >= 1e6) return `${(P/1e6).toFixed(2)} MW`;
    if (P >= 1e3) return `${(P/1e3).toFixed(2)} kW`;
    return `${P.toFixed(0)} W`;
}

function flashCard() {
    if (window.gsap) {
        gsap.fromTo('#waveCard',
            { borderColor: 'rgba(94,221,214,0.35)' },
            { borderColor: 'rgba(148,163,184,0.16)', duration: 0.7, ease: 'power2.out' });
        gsap.fromTo('#phasorCard',
            { borderColor: 'rgba(94,221,214,0.35)' },
            { borderColor: 'rgba(148,163,184,0.16)', duration: 0.7, ease: 'power2.out' });
    }
}

['vp', 'r', 'pf', 'f'].forEach(id => {
    $(id).addEventListener('input', () => { compute(); flashCard(); });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.mode = btn.dataset.mode;
        compute();
        flashCard();
    });
});

$('presetBalanced').addEventListener('click', () => {
    if (window.gsap) {
        gsap.to($('pf'), { value: 1, duration: 0.6, ease: 'power3.out',
            onUpdate: () => compute() });
        gsap.to($('vp'), { value: 220, duration: 0.6, ease: 'power3.out',
            onUpdate: () => compute() });
        gsap.to($('r'), { value: 10, duration: 0.6, ease: 'power3.out',
            onUpdate: () => compute() });
    } else {
        $('pf').value = 1; $('vp').value = 220; $('r').value = 10;
        compute();
    }
    flashCard();
});

$('freezeBtn').addEventListener('click', () => {
    state.frozen = !state.frozen;
    $('freezeBtn').textContent = state.frozen ? '▶ 재생' : '⏸ 정지';
});

// ====================================================
// 메인 루프
// ====================================================
function animate() {
    state.t++;
    if (!state.frozen) {
        // 회전 속도는 주파수에 비례 (시각화 스케일)
        state.omega += 0.018 * (state.f / 60);
    }
    drawWaves();
    drawPhasor();
    requestAnimationFrame(animate);
}

window.onload = () => {
    resize();
    compute();
    animate();
    if (window.gsap) {
        gsap.from('#hdr', { y: -10, opacity: 0, duration: 0.5, ease: 'power2.out' });
        gsap.from('#livePanel > *', { y: 8, opacity: 0, duration: 0.45, stagger: 0.05, delay: 0.1, ease: 'power2.out' });
        gsap.from('#waveCard', { opacity: 0, duration: 0.55, delay: 0.15, ease: 'power2.out' });
        gsap.from('#phasorCard', { opacity: 0, duration: 0.55, delay: 0.25, ease: 'power2.out' });
        gsap.from('#controlPanel', { y: 10, opacity: 0, duration: 0.45, delay: 0.25, ease: 'power2.out' });
    }
};
</script>
